<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h1>Danh sách sản phẩm</h1>
        <div sec:authorize="isAuthenticated()" class="auth-info">
            Chào, <b sec:authentication="name"></b> |
            <span class="badge bg-success" th:each="auth : ${#authentication.getAuthorities()}" th:text="${auth.getAuthority().replace('ROLE_', '')}"></span>
            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <button type="submit" class="btn btn-sm btn-outline-secondary">Đăng xuất</button>
            </form>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div sec:authorize="hasRole('ADMIN')" class="card bg-light my-3">
        <div class="card-body">
            <h5 class="card-title">Chức năng Admin</h5>
            <a th:href="@{/new}" class="btn btn-primary">Thêm sản phẩm mới</a>
            <hr>
            <form th:action="@{/deleteAllZeroQuantity}" method="post" class="d-inline-block align-middle">
                <button type="submit" class="btn btn-warning" onclick="return confirm('Hành động này sẽ cố tình gây lỗi để kiểm tra. Bạn chắc chắn muốn thử?')">
                    Kiểm tra xóa SP hết hàng
                </button>
                <div class="form-check form-check-inline ms-3">
                    <input class="form-check-input" type="checkbox" id="useTransaction" name="useTransaction" value="true" checked>
                    <label class="form-check-label" for="useTransaction">
                        <b>Sử dụng Transaction (An toàn)</b>
                    </label>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th> <th>Tên sản phẩm</th> <th>Số lượng</th>
            <th sec:authorize="hasRole('ADMIN')">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${listProducts}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{'/edit/' + ${product.id}}" class="btn btn-sm btn-info">Sửa</a>
                <a th:href="@{'/delete/' + ${product.id}}" class="btn btn-sm btn-danger ms-2" onclick="return confirm('Bạn chắc chắn muốn xóa?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
