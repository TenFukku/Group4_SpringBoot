<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body>
<div class="container mt-4">
    <h1 th:text="${pageTitle}"></h1>
    <hr>
    <form th:action="@{/save}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <div class="mb-3">
            <label for="name" class="form-label">Tên sản phẩm:</label>
            <input type="text" th:field="*{name}" id="name" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Số lượng:</label>
            <input type="number" th:field="*{quantity}" id="quantity" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-success">Lưu</button>
        <a th:href="@{/}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
