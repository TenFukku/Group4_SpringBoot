<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title}">Quản lý Tình nguyện viên</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navigation Fragment -->
    <nav
      th:fragment="navigation"
      class="navbar navbar-expand-lg navbar-dark bg-primary"
    >
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-heart"></i> Quản lý Tình nguyện viên
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Trang chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/volunteers">Tình nguyện viên</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/campaigns">Chiến dịch</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/skills">Kỹ năng</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Footer Fragment -->
    <footer
      th:fragment="footer"
      class="bg-dark text-white text-center py-3 mt-5"
    >
      <div class="container">
        <p class="mb-0">
          &copy; 2024 Hệ thống Quản lý Tình nguyện viên. Được phát triển với
          Spring Boot & Thymeleaf.
        </p>
      </div>
    </footer>

    <!-- Success Message Fragment -->
    <div
      th:fragment="success-message"
      th:if="${success}"
      class="alert alert-success alert-custom"
      role="alert"
    >
      <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
    </div>

    <!-- Error Message Fragment -->
    <div
      th:fragment="error-message"
      th:if="${error}"
      class="alert alert-danger alert-custom"
      role="alert"
    >
      <i class="fas fa-exclamation-triangle"></i>
      <span th:text="${error}"></span>
    </div>

    <!-- Field Error Fragment -->
    <div
      th:fragment="field-error(fieldName)"
      th:if="${#fields.hasErrors(fieldName)}"
      class="text-danger"
    >
      <small th:errors="*{__${fieldName}__}"></small>
    </div>

    <!-- Submit Button Fragment -->
    <button
      th:fragment="submit-button(buttonText)"
      type="submit"
      class="btn btn-primary"
      th:disabled="${#fields.hasErrors('*')}"
      th:title="${#fields.hasErrors('*') ? 'Vui lòng sửa lỗi trước khi lưu' : 'Lưu thông tin'}"
    >
      <i class="fas fa-save"></i> <span th:text="${buttonText}">Lưu</span>
    </button>

    <!-- Back Button Fragment -->
    <a
      th:fragment="back-button(url)"
      th:href="@{__${url}__}"
      class="btn btn-secondary"
    >
      <i class="fas fa-arrow-left"></i> Quay lại
    </a>

    <!-- Script Fragment -->
    <script
      th:fragment="scripts"
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
