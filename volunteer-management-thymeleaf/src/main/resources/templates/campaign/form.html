<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title}">Thêm/Sửa Chiến dịch</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="../../static/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-heart"></i> Quản lý Tình nguyện viên
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Trang chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/volunteers">Tình nguyện viên</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/campaigns">Chiến dịch</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/skills">Kỹ năng</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-header">
              <h5>
                <i class="fas fa-calendar-alt text-success"></i>
                <span th:text="${title}">Thêm/Sửa Chiến dịch</span>
              </h5>
            </div>
            <div class="card-body">
              <form
                th:action="@{/campaigns/add}"
                th:object="${campaign}"
                method="post"
              >
                <div class="mb-3">
                  <label for="name" class="form-label"
                    >Tên chiến dịch <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    th:field="*{name}"
                    placeholder="Nhập tên chiến dịch"
                    required
                  />
                  <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                    <small th:errors="*{name}"></small>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="startDate" class="form-label"
                      >Ngày bắt đầu <span class="text-danger">*</span></label
                    >
                    <input
                      type="date"
                      class="form-control"
                      id="startDate"
                      th:field="*{startDate}"
                      required
                    />
                    <div
                      th:if="${#fields.hasErrors('startDate')}"
                      class="text-danger"
                    >
                      <small th:errors="*{startDate}"></small>
                    </div>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label for="endDate" class="form-label"
                      >Ngày kết thúc <span class="text-danger">*</span></label
                    >
                    <input
                      type="date"
                      class="form-control"
                      id="endDate"
                      th:field="*{endDate}"
                      required
                    />
                    <div
                      th:if="${#fields.hasErrors('endDate')}"
                      class="text-danger"
                    >
                      <small th:errors="*{endDate}"></small>
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="location" class="form-label"
                    >Địa điểm <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="location"
                    th:field="*{location}"
                    placeholder="Nhập địa điểm tổ chức"
                    required
                  />
                  <div
                    th:if="${#fields.hasErrors('location')}"
                    class="text-danger"
                  >
                    <small th:errors="*{location}"></small>
                  </div>
                </div>

                <div class="d-flex justify-content-between">
                  <a href="/campaigns" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại
                  </a>
                  <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Lưu chiến dịch
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
      <div class="container">
        <p class="mb-0">
          &copy; 2024 Hệ thống Quản lý Tình nguyện viên. Được phát triển với
          Spring Boot & Thymeleaf.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
